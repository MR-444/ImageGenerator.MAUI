<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Emberforge foreground glyph: a bold ember flame, three nested teardrops from a
         deep-ember outer edge to a hot inner core. One simple shape per layer so it stays
         legible down to 16px; glows on the near-black appicon.svg background. -->

    <!-- Outer flame — deep ember edge -->
    <path d="M 228 96
             C 286 176, 308 232, 308 276
             C 308 320, 272 350, 228 350
             C 184 350, 148 320, 148 276
             C 148 232, 170 176, 228 96 Z"
          fill="#E8530E" />

    <!-- Mid flame — bright orange -->
    <path d="M 228 162
             C 268 214, 284 252, 284 280
             C 284 312, 260 332, 228 332
             C 196 332, 172 312, 172 280
             C 172 252, 188 214, 228 162 Z"
          fill="#FF8C00" />

    <!-- Hot core -->
    <path d="M 228 220
             C 250 250, 258 268, 258 284
             C 258 304, 244 316, 228 316
             C 212 316, 198 304, 198 284
             C 198 268, 206 250, 228 220 Z"
          fill="#FFC766" />
</svg>
