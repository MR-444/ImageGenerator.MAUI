<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
    <!-- Foreground glyph for the AI Image Generator icon: a framed scene
         (sun + mountains) with an AI sparkle. Drawn in white; the violet
         (#512BD4) background shows through the inner cut-out and behind the
         sparkle halo. Keep shapes bold so it stays legible at 16px. -->
    <defs>
        <clipPath id="opening">
            <rect x="146" y="146" width="164" height="164" rx="16" ry="16" />
        </clipPath>
    </defs>

    <!-- Picture frame: white border created by a violet inner cut-out -->
    <rect x="116" y="116" width="224" height="224" rx="30" ry="30" style="fill:#ffffff" />
    <rect x="146" y="146" width="164" height="164" rx="16" ry="16" style="fill:#512BD4" />

    <!-- Scene inside the frame, clipped to the opening -->
    <g clip-path="url(#opening)">
        <!-- Sun -->
        <circle cx="186" cy="190" r="24" style="fill:#ffffff" />
        <!-- Mountains (two overlapping peaks) -->
        <path d="M 150,310 L 210,212 L 272,310 Z" style="fill:#ffffff" />
        <path d="M 224,310 L 286,238 L 310,310 Z" style="fill:#ffffff" />
    </g>

    <!-- AI sparkle, top-right, overlapping the frame corner.
         A violet halo carves separation from the white frame. -->
    <path d="M 348,60 Q 348,112 400,112 Q 348,112 348,164 Q 348,112 296,112 Q 348,112 348,60 Z" style="fill:#512BD4" />
    <path d="M 348,70 Q 348,112 390,112 Q 348,112 348,154 Q 348,112 306,112 Q 348,112 348,70 Z" style="fill:#ffffff" />
</svg>
